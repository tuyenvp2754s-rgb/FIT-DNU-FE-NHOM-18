<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PetAdopt</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="css/index.css" />
  </head>
  <body
    class="animated-bg min-h-screen flex flex-col overflow-x-hidden selection:bg-indigo-500 selection:text-white"
  >
    <div
      class="fixed top-20 left-10 w-96 h-96 bg-indigo-200 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-blob"
    ></div>
    <div
      class="fixed top-40 right-10 w-96 h-96 bg-purple-200 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-blob delay-2000"
    ></div>
    <div
      class="fixed bottom-10 left-20 w-96 h-96 bg-pink-200 rounded-full mix-blend-multiply filter blur-3xl opacity-15 animate-blob delay-4000"
    ></div>

    <nav
      class="glass-panel sticky top-0 z-40 border-b border-slate-200/50 shadow-sm"
    >
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between h-20">
          <a
            href="index.html"
            class="flex items-center space-x-3 group relative"
          >
            <span
              class="text-3xl transform group-hover:rotate-12 group-hover:scale-110 transition-all duration-300"
              >🐶</span
            >
            <span
              class="font-extrabold text-2xl tracking-tight bg-gradient-to-r from-indigo-600 via-purple-600 to-pink-600 bg-clip-text text-transparent group-hover:brightness-110 transition-all"
              >PetAdopt</span
            >
          </a>

          <div class="flex items-center space-x-4">
            <span
              id="api-status"
              class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-semibold bg-amber-50 text-amber-600 border border-amber-100"
            >
              <span
                class="w-1.5 h-1.5 rounded-full bg-amber-500 animate-pulse"
              ></span>
              Đang kết nối...
            </span>
            <a
              href="admin.html"
              class="bg-indigo-600 hover:bg-indigo-700 active:scale-95 text-white px-5 py-2.5 rounded-2xl font-bold shadow-lg shadow-indigo-600/10 transition-all duration-300 text-sm flex items-center gap-2"
            >
              <i class="fa-solid fa-user-gear"></i> Quản trị
            </a>
          </div>
        </div>
      </div>
    </nav>

    <header class="py-16 text-center relative z-10">
      <div class="max-w-4xl mx-auto px-4">
        <h1
          class="text-4xl sm:text-6xl font-black text-slate-900 tracking-tight leading-none mb-6"
        >
          Tìm kiếm mảnh ghép <br />
          <span
            class="bg-gradient-to-r from-indigo-600 via-purple-600 to-pink-600 bg-clip-text text-transparent"
            >yêu thương hoàn hảo</span
          >
        </h1>
        <p
          class="text-slate-500 text-base sm:text-lg font-medium max-w-xl mx-auto mb-10"
        >
          Hệ thống kết nối thời gian thực và tự động tối ưu hình ảnh từ Mock
          API.
        </p>

        <div class="glass-panel p-6 rounded-3xl shadow-xl max-w-3xl mx-auto">
          <div class="flex flex-col md:flex-row gap-3">
            <div class="relative flex-grow">
              <i
                class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"
              ></i>
              <input
                type="text"
                id="search-input"
                oninput="filterAndSort()"
                placeholder="Tìm theo tên hoặc giống loài..."
                class="w-full bg-white/90 border border-slate-200 rounded-2xl pl-11 pr-4 py-3.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all shadow-sm"
              />
            </div>
            <div class="flex gap-2">
              <select
                id="gender-filter"
                onchange="filterAndSort()"
                class="bg-white/90 border border-slate-200 rounded-2xl px-4 py-3.5 text-sm font-semibold text-slate-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all"
              >
                <option value="all">Tất cả giới tính</option>
                <option value="male">Đực</option>
                <option value="female">Cái</option>
              </select>
              <select
                id="sort-filter"
                onchange="filterAndSort()"
                class="bg-white/90 border border-slate-200 rounded-2xl px-4 py-3.5 text-sm font-semibold text-slate-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all"
              >
                <option value="default">Sắp xếp</option>
                <option value="price-asc">Phí nuôi tăng dần</option>
                <option value="price-desc">Phí nuôi giảm dần</option>
                <option value="age-asc">Tuổi nhỏ nhất</option>
              </select>
            </div>
          </div>
        </div>
      </div>
    </header>

    <main
      class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex-grow w-full relative z-10"
    >
      <div
        id="skeleton-container"
        class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8"
      >
        <div
          class="bg-white rounded-[32px] p-4 border border-slate-100 space-y-4 shadow-sm"
        >
          <div class="shimmer-effect rounded-2xl h-56 w-full"></div>
          <div class="shimmer-effect h-5 rounded w-1/2"></div>
          <div class="shimmer-effect h-3 rounded w-1/3"></div>
          <div class="shimmer-effect h-12 rounded-2xl w-full"></div>
        </div>
        <div
          class="bg-white rounded-[32px] p-4 border border-slate-100 space-y-4 shadow-sm"
        >
          <div class="shimmer-effect rounded-2xl h-56 w-full"></div>
          <div class="shimmer-effect h-5 rounded w-1/2"></div>
          <div class="shimmer-effect h-3 rounded w-1/3"></div>
          <div class="shimmer-effect h-12 rounded-2xl w-full"></div>
        </div>
        <div
          class="bg-white rounded-[32px] p-4 border border-slate-100 space-y-4 shadow-sm"
        >
          <div class="shimmer-effect rounded-2xl h-56 w-full"></div>
          <div class="shimmer-effect h-5 rounded w-1/2"></div>
          <div class="shimmer-effect h-3 rounded w-1/3"></div>
          <div class="shimmer-effect h-12 rounded-2xl w-full"></div>
        </div>
      </div>

      <div
        id="pet-container"
        class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8 hidden"
      ></div>
    </main>

    <div
      id="adopt-modal"
      class="fixed inset-0 bg-slate-950/60 backdrop-blur-md z-50 flex items-center justify-center hidden opacity-0 transition-opacity duration-300"
    >
      <div
        class="bg-white rounded-[32px] max-w-lg w-full mx-4 overflow-hidden shadow-2xl transform scale-95 transition-transform duration-300 flex flex-col max-h-[90vh]"
      >
        <div class="relative h-64 bg-slate-100 flex-shrink-0">
          <img
            id="modal-pet-img"
            src=""
            alt="Pet"
            class="w-full h-full object-cover"
          />
          <div
            class="absolute inset-0 bg-gradient-to-t from-black/70 via-transparent to-transparent"
          ></div>
          <button
            onclick="closeModal()"
            class="absolute top-4 right-4 bg-white/25 hover:bg-white/45 text-white w-10 h-10 rounded-full flex items-center justify-center transition-all backdrop-blur-md hover:rotate-90"
          >
            <i class="fa-solid fa-times text-lg"></i>
          </button>
          <div class="absolute bottom-6 left-6 text-white">
            <h3
              id="modal-pet-name"
              class="text-3xl font-extrabold tracking-tight"
            ></h3>
            <p
              id="modal-pet-info"
              class="text-sm font-semibold opacity-90 mt-1"
            ></p>
          </div>
        </div>
        <div class="p-8 overflow-y-auto flex-grow space-y-6 custom-scrollbar">
          <div>
            <h4
              class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2"
            >
              Thông tin đặc trưng
            </h4>
            <p
              id="modal-pet-desc"
              class="text-slate-600 text-sm leading-relaxed"
            ></p>
          </div>

          <form
            id="adopt-form"
            onsubmit="submitForm(event)"
            class="space-y-4 border-t border-slate-100 pt-6"
          >
            <input type="hidden" id="modal-pet-id" />
            <div>
              <label
                class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5"
                >Họ và tên của bạn</label
              >
              <input
                type="text"
                id="user-name"
                required
                class="w-full border border-slate-200 rounded-2xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all"
              />
            </div>
            <div>
              <label
                class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5"
                >Số điện thoại liên hệ</label
              >
              <input
                type="tel"
                id="user-phone"
                required
                class="w-full border border-slate-200 rounded-2xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all"
              />
            </div>
            <button
              id="submit-btn"
              type="submit"
              class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:brightness-110 active:scale-[0.98] text-white font-bold py-3.5 rounded-2xl shadow-lg shadow-indigo-600/20 transition-all flex items-center justify-center gap-2"
            >
              <i class="fa-solid fa-heart-circle-check"></i> Đăng Ký Nhận Nuôi
            </button>
          </form>
        </div>
      </div>
    </div>

    <div
      id="toast"
      class="fixed bottom-6 right-6 bg-slate-900/95 backdrop-blur-md text-white px-6 py-4 rounded-2xl shadow-2xl z-50 transform translate-y-20 opacity-0 transition-all duration-300 flex items-center gap-3 border border-slate-800"
    >
      <div
        id="toast-icon"
        class="bg-indigo-500 w-8 h-8 rounded-full flex items-center justify-center text-sm"
      >
        🐶
      </div>
      <div>
        <p id="toast-title" class="font-bold text-sm"></p>
        <p id="toast-msg" class="text-xs text-slate-400 mt-0.5"></p>
      </div>
    </div>

    <footer
      class="bg-white/60 border-t border-slate-200/50 py-8 text-center text-sm text-slate-500 mt-12 relative z-10"
    >
      <p>© 2026 PetAdopt High-End. MockAPI Synchronized.</p>
    </footer>

    <script src="js/index.js"></script>
  </body>
</html>
